name: "Test KiABOM"

on:
  push:

jobs:
  python-test:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create config.yaml
        shell: bash
        env:
          TEST_DIGIKEY_CLIENT_ID: ${{ secrets.TEST_DIGIKEY_CLIENT_ID }}
          TEST_DIGIKEY_CLIENT_SECRET: ${{ secrets.TEST_DIGIKEY_CLIENT_SECRET }}
          TEST_MOUSER_KEY: ${{ secrets.TEST_MOUSER_KEY }}
        run: |
            echo "
            DigiKey:
                client_id: $TEST_DIGIKEY_CLIENT_ID
                client_secret: $TEST_DIGIKEY_CLIENT_SECRET
                sandbox: False
              Mouser:
                key: $TEST_MOUSER_KEY
            " > src/config.yaml
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Pip
        run: |
          python -m pip install --upgrade pip

      - name: Autoformat
        run: |
          pip install ruff
          ruff format src/kiabom.py

      - name: Install deps
        run: |
          pip install -r src/requirements.txt
          pip install setuptools
          pip install six
          pip install pytest pytest-cov

      - name: Test with pytest and generate coverage report
        run: |
          pytest --cov=. --cov-report=xml

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          report: coverage.xml
          language: Python
          label: KiABOM

